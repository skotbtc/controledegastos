document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n      <div style=\"background: #14181f; border: 1px solid #242a34; border-radius: 18px; padding: 20px;\">\n        <div style=\"font-size: 12px; color: #8b909a; font-weight: 600;\">Contas fixas<\u002Fdiv>\n        <div style=\"font-size: 23px; font-weight: 800; margin-top: 10px; letter-spacing: -0.3px; white-space: nowrap;\">{{ totalFixedFmt }}<\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; font-size: 11px; font-weight: 600;\">\n          <span style=\"background:#1c212a; color:#9aa0aa; padding:3px 8px; border-radius:7px; white-space:nowrap;\">{{ fixedUsdFmt }}<\u002Fspan>\n          <span style=\"background:rgba(247,147,26,0.12); color:#f7931a; padding:3px 8px; border-radius:7px; white-space:nowrap;\">{{ fixedBtcFmt }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #14181f; border: 1px solid #242a34; border-radius: 18px; padding: 20px;\" title=\"Reais: soma de todos os lançamentos + todas as contas fixas por mês decorrido. BTC e dólar contam só o que já foi pago, pela cotação do dia do pagamento: cada fatura de cartão (ao marcar o cartão como pago no mês) e cada conta fixa (ao marcar como paga). Assim, parcelas que caem em meses diferentes registram quantidades diferentes de BTC.\">\n        <div style=\"font-size: 12px; color: #8b909a; font-weight: 600;\">Acumulado · {{ monthsSpanLabel }}<\u002Fdiv>\n        <div style=\"font-size: 23px; font-weight: 800; margin-top: 10px; letter-spacing: -0.3px; white-space: nowrap;\">{{ grandTotalFmt }}<\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; font-size: 11px; font-weight: 600;\">\n          <span style=\"background:#1c212a; color:#9aa0aa; padding:3px 8px; border-radius:7px; white-space:nowrap;\">{{ grandUsdFmt }}<\u002Fspan>\n          <span style=\"background:rgba(247,147,26,0.12); color:#f7931a; padding:3px 8px; border-radius:7px; white-space:nowrap;\">{{ grandBtcFmt }}<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasPending }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size: 10px; color: #6b7280; margin-top: 6px; line-height: 1.35;\">{{ pendingNote }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CHARTS ROW -->\n    <div class=\"chartsRow\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px;\">\n      <!-- DONUT -->\n      <div style=\"background: #14181f; border: 1px solid #242a34; border-radius: 18px; padding: 22px;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;\">\n          <div style=\"font-size: 14px; font-weight: 700;\">Gastos por categoria<\u002Fdiv>\n          <button onclick=\"{{ toggleFixed }}\" style=\"font-size: 11.5px; font-weight: 600; padding: 6px 11px; border-radius: 9px; cursor: pointer; border: 1px solid #242a34; background: {{ fixedBtnBg }}; color: {{ fixedBtnColor }};\">Incluir fixas<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"donutWrap\" style=\"display: flex; gap: 20px; align-items: center;\">\n          <div style=\"position: relative; width: 180px; height: 180px; flex: none;\">\n            {{ donutSvg }}\n            <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none;\">\n              <div style=\"font-size: 11px; color: #8b909a;\">no mês<\u002Fdiv>\n              <div style=\"font-size: 19px; font-weight: 800; letter-spacing: -0.4px;\">{{ donutTotalFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex: 1; display: flex; flex-direction: column; gap: 9px;\">\n            <sc-for list=\"{{ categoryData }}\" as=\"c\" hint-placeholder-count=\"5\">\n              <div style=\"display: flex; align-items: center; gap: 9px; font-size: 12.5px;\">\n                <span style=\"width: 10px; height: 10px; border-radius: 3px; background: {{ c.color }}; flex: none;\"><\u002Fspan>\n                <span style=\"color: #c4c8d0; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ c.name }}<\u002Fspan>\n                <span style=\"color: #8b909a; font-size: 11.5px;\">{{ c.pctLabel }}<\u002Fspan>\n                <span style=\"font-weight: 600; min-width: 78px; text-align: right;\">{{ c.valueFmt }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- BARS -->\n      <div style=\"background: #14181f; border: 1px solid #242a34; border-radius: 18px; padding: 22px; display: flex; flex-direction: column;\">\n        <div style=\"font-size: 14px; font-weight: 700; margin-bottom: 18px;\">Gasto por cartão<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 16px;\">\n          <sc-for list=\"{{ cardData }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div style=\"display: flex; align-items: center; gap: 12px; padding: 6px 8px; margin: 0 -8px; border-radius: 10px; background: {{ c.rowBg }}; box-shadow: inset 2px 0 0 {{ c.rowBorder }};\">\n              <button onclick=\"{{ c.onToggle }}\" title=\"Marcar fatura como paga\" style=\"width: 22px; height: 22px; flex: none; border-radius: 7px; border: 2px solid {{ c.checkBorder }}; background: {{ c.checkBg }}; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;\">\n                <sc-if value=\"{{ c.paid }}\" hint-placeholder-val=\"{{ false }}\">\n                  <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0d0f13\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                <\u002Fsc-if>\n              <\u002Fbutton>\n              <div style=\"flex: 1; min-width: 0;\">\n                <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px;\">\n                  <div style=\"display: flex; align-items: center; gap: 10px; min-width: 0;\">\n                    <div onclick=\"{{ c.onSelect }}\" title=\"Ver só os gastos deste cartão (clique de novo para limpar)\" style=\"display: flex; align-items: center; gap: 8px; min-width: 142px; font-size: 13px; font-weight: 600; color: {{ c.nameColor }}; text-decoration: {{ c.strike }}; cursor: pointer;\">\n                      <span style=\"width: 10px; height: 10px; border-radius: 3px; background: {{ c.color }}; flex: none;\"><\u002Fspan>{{ c.name }}\n                    <\u002Fdiv>\n                    <span style=\"display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; font-size: 11px; color: #8b909a; font-weight: 500; background: #11151b; border: 1px solid #242a34; border-radius: 8px; padding: 3px 4px 3px 9px;\">vence dia\n                      <input type=\"number\" min=\"1\" max=\"31\" placeholder=\"—\" value=\"{{ c.dueDay }}\" onchange=\"{{ c.onSetDue }}\" title=\"Dia de vencimento da fatura\" style=\"width: 40px; height: 20px; background: #181d25; border: 1px solid #2a3140; border-radius: 6px; color: #e6e8eb; padding: 0 4px; font-size: 11px; font-weight: 600; outline: none; text-align: center;\" style-focus=\"border-color:var(--accent);\">\n                    <\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size: 13px; font-weight: 700; color: {{ c.nameColor }}; flex: none;\">{{ c.valueFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"height: 9px; background: #1c212a; border-radius: 6px; overflow: hidden;\">\n                  <div style=\"height: 100%; border-radius: 6px; background: {{ c.color }}; width: {{ c.barWidth }};\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TRANSACTIONS + FIXED BILLS - ; height: 40px; background: #11151b; border: 1px solid #242a34; border-radius: 10px; color: #e6e8eb; padding: 0 12px; font-size: 13px; outline: none;\" style-focus=\"border-color:var(--accent);\">\n          <select ref=\"{{ cardRef }}\" onchange=\"{{ onFormCardChange }}\" style=\"width: 130px; height: 40px; background: #11151b; border: 1px solid #242a34; border-radius: 10px; color: #e6e8eb; padding: 0 10px; font-size: 13px; outline: none; cursor: pointer;\">\n            <sc-for list=\"{{ cardNames }}\" as=\"n\" hint-placeholder-count=\"4\"><option value=\"{{ n }}\">{{ n }}<\u002Foption><\u002Fsc-for>\n          <\u002Fselect>\n          <select ref=\"{{ catRef }}\" style=\"width: 160px; height: 40px; background: #11151b; border: 1px solid #242a34; border-radius: 10px; color: #e6e8eb; padding: 0 10px; font-size: 13px; outline: none; cursor: pointer;\">\n            <sc-for list=\"{{ catNames }}\" as=\"n\" hint-placeholder-count=\"7\"><option value=\"{{ n }}\">{{ n }}<\u002Foption><\u002Fsc-for>\n          <\u002Fselect>\n          <input ref=\"{{ dateRef }}\" type=\"date\" defaultvalue=\"{{ todayStr }}\" style=\"width: 140px; height: 40px; background: #11151b; border: 1px solid #242a34; border-radius: 10px; color: #e6e8eb; padding: 0 12px; font-size: 13px; outline: none;\" style-focus=\"border-color:var(--accent);\">\n          <div style=\"display: flex; align-items: center; gap: 6px; height: 40px; padding: 0 11px; background: #11151b; border: 1px solid #242a34; border-radius: 10px;\" title=\"Parcelamento — a parcela atual entra neste mês e as seguintes nas próximas faturas\">\n            <span style=\"font-size: 12px; color: #8b909a; font-weight: 600;\">Parcela<\u002Fspan>\n            <input ref=\"{{ parcelaAtualRef }}\" type=\"number\" min=\"1\" placeholder=\"1\" style=\"width: 34px; height: 26px; background: #181d25; border: 1px solid #242a34; border-radius: 7px; color: #e6e8eb; padding: 0 6px; font-size: 13px; outline: none; text-align: center;\" style-focus=\"border-color:var(--accent);\">\n            <span style=\"font-size: 12px; color: #6b7280;\">de<\u002Fspan>\n            <input ref=\"{{ parcelaTotalRef }}\" type=\"number\" min=\"1\" placeholder=\"1\" style=\"width: 34px; height: 26px; background: #181d25; border: 1px solid #242a34; border-radius: 7px; color: #e6e8eb; padding: 0 6px; font-size: 13px; outline: none; text-align: center;\" style-focus=\"border-color:var(--accent);\">\n          <\u002Fdiv>\n          <label title=\"Assinatura recorrente — repete automaticamente nas próximas faturas\" style=\"display: flex; align-items: center; gap: 7px; height: 40px; padding: 0 12px; background: #11151b; border: 1px solid #242a34; border-radius: 10px; cursor: pointer; user-select: none;\">\n            <input ref=\"{{ recorrenteRef }}\" type=\"checkbox\" checked=\"{{ recorrente }}\" onchange=\"{{ onRecorrente }}\" style=\"width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;\">\n            <span style=\"font-size: 12.5px; color: #c4c8d0; font-weight: 600;\">Recorrente<\u002Fspan>\n          <\u002Flabel>\n          <button onclick=\"{{ addTx }}\" style=\"height: 40px; padding: 0 18px; border: none; background: var(--accent); color: #0d0f13; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 6px;\" style-hover=\"filter:brightness(1.08);\">{{ addBtnLabel }}<\u002Fbutton>\n          <sc-if value=\"{{ isEditing }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ cancelEdit }}\" title=\"Cancelar edição\" style=\"height: 40px; padding: 0 14px; border: 1px solid #242a34; background: #11151b; color: #c4c8d0; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px;\" style-hover=\"border-color:#33404c;color:#fff;\">Cancelar<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 14px;\">\n          <input value=\"{{ searchValue }}\" oninput=\"{{ onSearch }}\" placeholder=\"Buscar por descrição, cartão ou categoria…\" style=\"flex: 1 1 200px; min-width: 150px; height: 36px; background: #11151b; border: 1px solid #242a34; border-radius: 10px; color: #e6e8eb; padding: 0 12px; font-size: 12.5px; outline: none;\" style-focus=\"border-color:var(--accent);\">\n          <select value=\"{{ filterCatValue }}\" onchange=\"{{ onFilterCat }}\" style=\"width: 180px; height: 36px; background: #11151b; border: 1px solid #242a34; border-radius: 10px; color: #e6e8eb; padding: 0 10px; font-size: 12.5px; outline: none; cursor: pointer;\">\n            <sc-for list=\"{{ filterCatOptions }}\" as=\"n\" hint-placeholder-count=\"8\"><option value=\"{{ n }}\">{{ n }}<\u002Foption><\u002Fsc-for>\n          <\u002Fselect>\n        <\u002Fdiv>\n\n        <div class=\"scrl\" style=\"max-height: 360px; overflow-y: auto; margin: 0 -6px; padding: 0 6px;\">\n          <sc-if value=\"{{ hasTx }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display: flex; flex-direction: column;\">\n              <sc-for list=\"{{ filteredTx }}\" as=\"t\" hint-placeholder-count=\"6\">\n                <div style=\"display: flex; align-items: center; gap: 12px; padding: 11px 4px; border-bottom: 1px solid #1c212a;\">\n                  <div style=\"width: 42px; font-size: 11.5px; color: #8b909a; font-weight: 600; flex: none;\">{{ t.dateShort }}<\u002Fdiv>\n                  <div style=\"flex: 1; min-width: 0;\">\n                    <div style=\"font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ t.description }}<\u002Fdiv>\n                    <div style=\"display: flex; align-items: center; gap: 7px; margin-top: 3px;\">\n                      <span style=\"display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: #9aa0aa;\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: {{ t.catColor }};\"><\u002Fspan>{{ t.category }}<\u002Fspan>\n                      <span style=\"font-size: 11px; color: #6b7280;\">·<\u002Fspan>\n                      <span style=\"display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: #9aa0aa;\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: {{ t.cardColor }};\"><\u002Fspan>{{ t.card }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ t.hasParcela }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size: 10.5px; font-weight: 700; color: var(--accent); background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.30); padding: 2px 7px; border-radius: 6px; flex: none;\">{{ t.parcelaLabel }}<\u002Fspan>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ t.isRecorrente }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span title=\"Assinatura recorrente\" style=\"font-size: 10.5px; font-weight: 700; color: var(--accent); background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.30); padding: 2px 7px; border-radius: 6px; flex: none;\">↻ mensal<\u002Fspan>\n                  <\u002Fsc-if>\n                  <div style=\"flex: none; text-align: right;\">\n                    <div style=\"font-weight: 700; font-size: 14px;\">{{ t.amountFmt }}<\u002Fdiv>\n                    <sc-if value=\"{{ t.hasParcela }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"font-size: 10px; color: #6b7280; font-weight: 600; margin-top: 2px; white-space: nowrap;\">total {{ t.totalParceladoFmt }}<\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ t.onEdit }}\" title=\"Editar lançamento\" style=\"width: 28px; height: 28px; border: none; background: transparent; color: #5b616e; border-radius: 8px; cursor: pointer; flex: none; display: flex; align-items: center; justify-content: center;\" style-hover=\"background:#1c2530;color:#7dd3fc;\">\n                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fbutton>\n                  <button onclick=\"{{ t.onDelete }}\" title=\"Excluir (remove todas as parcelas da compra)\" style=\"width: 28px; height: 28px; border: none; background: transparent; color: #5b616e; border-radius: 8px; cursor: pointer; flex: none; display: flex; align-items: center; justify-content: center;\" style-hover=\"background:#2a1d22;color:#fb7185;\">\n                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14\"><\u002Fpath><\u002Fsvg>\n                  <\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noTx }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align: center; padding: 40px 20px; color: #6b7280; font-size: 13px;\">Nenhum lançamento neste mês.<br>Adicione seu primeiro gasto acima.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- FIXED BILLS -->\n      <div style=\"background: #14181f; border: 1px solid #242a34; border-radius: 18px; padding: 22px;\">\n        <div style=\"font-size: 14px; font-weight: 700; margin-bottom: 14px;\">Contas fixas mensais<\u002Fdiv>\n\n        <div style=\"display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px;\">\n          <input ref=\"{{ billNameRef }}\" placeholder=\"Nome (ex: Internet)\" style=\"height: 38px; background: #11151b; border: 1px solid #242a34; border-radius: 10px; color: #e6e8eb; padding: 0 12px; font-size: 13px; outline: none;\" style-focus=\"border-color:var(--accent);\">\n          <div style=\"display: flex; gap: 9px;\">\n            <input ref=\"{{ billAmountRef }}\" type=\"number\" step=\"0.01\" placeholder=\"0,00\" style=\"flex: 1; height: 38px; background: #11151b; border: 1px solid #242a34; border-radius: 10px; color: #e6e8eb; padding: 0 12px; font-size: 13px; outline: none;\" style-focus=\"border-color:var(--accent);\">\n            <input ref=\"{{ billDayRef }}\" type=\"number\" min=\"1\" max=\"31\" placeholder=\"dia\" style=\"width: 70px; height: 38px; background: #11151b; border: 1px solid #242a34; border-radius: 10px; color: #e6e8eb; padding: 0 12px; font-size: 13px; outline: none;\" style-focus=\"border-color:var(--accent);\">\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 9px; align-items: center;\">\n            <select ref=\"{{ billCatRef }}\" style=\"flex: 1; height: 38px; background: #11151b; border: 1px solid #242a34; border-radius: 10px; color: #e6e8eb; padding: 0 10px; font-size: 13px; outline: none; cursor: pointer;\">\n              <sc-for list=\"{{ catNames }}\" as=\"n\" hint-placeholder-count=\"7\"><option value=\"{{ n }}\">{{ n }}<\u002Foption><\u002Fsc-for>\n            <\u002Fselect>\n            <button onclick=\"{{ addBill }}\" style=\"height: 38px; padding: 0 16px; border: none; background: var(--accent); color: #0d0f13; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 13px;\" style-hover=\"filter:brightness(1.08);\">+ Add<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 6px; height: 38px; padding: 0 11px; background: #11151b; border: 1px solid #242a34; border-radius: 10px;\" title=\"Parcelamento (ex: 3 de 60). Deixe em branco para conta fixa sem fim.\">\n            <span style=\"font-size: 12px; color: #8b909a; font-weight: 600;\">Parcela<\u002Fspan>\n            <input ref=\"{{ billParcAtualRef }}\" type=\"number\" min=\"1\" placeholder=\"–\" style=\"width: 40px; height: 26px; background: #181d25; border: 1px solid #242a34; border-radius: 7px; color: #e6e8eb; padding: 0 4px; font-size: 13px; outline: none; text-align: center;\" style-focus=\"border-color:var(--accent);\">\n            <span style=\"font-size: 12px; color: #6b7280;\">de<\u002Fspan>\n            <input ref=\"{{ billParcTotalRef }}\" type=\"number\" min=\"1\" placeholder=\"–\" style=\"width: 40px; height: 26px; background: #181d25; border: 1px solid #242a34; border-radius: 7px; color: #e6e8eb; padding: 0 4px; font-size: 13px; outline: none; text-align: center;\" style-focus=\"border-color:var(--accent);\">\n            <span style=\"font-size: 11px; color: #6b7280; margin-left: 2px;\">(opcional)<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 12px; color: #8b909a; font-weight: 600;\">\n          <span>{{ paidLabel }}<\u002Fspan>\n          <span>{{ paidProgressLabel }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <div class=\"scrl\" style=\"max-height: 300px; overflow-y: auto; margin: 0 -4px; padding: 0 4px;\">\n          <sc-for list=\"{{ fixedBills }}\" as=\"b\" hint-placeholder-count=\"5\">\n            <div style=\"display: flex; align-items: center; gap: 10px; padding: 10px 4px; border-bottom: 1px solid #1c212a; opacity: {{ b.rowOpacity }};\">\n              <button onclick=\"{{ b.onToggle }}\" title=\"Marcar como pago\" style=\"width: 22px; height: 22px; flex: none; border-radius: 7px; border: 2px solid {{ b.checkBorder }}; background: {{ b.checkBg }}; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;\">\n                <sc-if value=\"{{ b.paid }}\" hint-placeholder-val=\"{{ false }}\">\n                  <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0d0f13\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                <\u002Fsc-if>\n              <\u002Fbutton>\n              <span style=\"width: 8px; height: 8px; border-radius: 50%; background: {{ b.catColor }}; flex: none;\"><\u002Fspan>\n              <div style=\"flex: 1; min-width: 0;\">\n                <div style=\"font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-decoration: {{ b.strike }};\">{{ b.name }}<\u002Fdiv>\n                <div style=\"display: flex; align-items: center; gap: 6px; margin-top: 2px;\">\n                  <span style=\"font-size: 11px; color: {{ b.dueColor }};\">{{ b.statusLabel }}<\u002Fspan>\n                  <sc-if value=\"{{ b.hasParcela }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size: 10px; font-weight: 700; color: var(--accent); background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.30); padding: 1px 6px; border-radius: 5px;\">{{ b.parcelaLabel }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-weight: 700; font-size: 13px; flex: none;\">{{ b.amountFmt }}<\u002Fdiv>\n              <button onclick=\"{{ b.onDelete }}\" style=\"width: 26px; height: 26px; border: none; background: transparent; color: #5b616e; border-radius: 7px; cursor: pointer; flex: none; display: flex; align-items: center; justify-content: center;\" style-hover=\"background:#2a1d22;color:#fb7185;\">\n                <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-top: 16px; padding-top: 14px; border-top: 1px solid #242a34;\">\n          <span style=\"font-size: 13px; color: #8b909a; font-weight: 600;\">Falta pagar<\u002Fspan>\n          <span style=\"font-size: 17px; font-weight: 800; color: var(--accent);\">{{ totalUnpaidFmt }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- LINE CHART -->\n    <div style=\"background: #14181f; border: 1px solid #242a34; border-radius: 18px; padding: 22px; margin-top: 18px;\">\n      <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;\">\n        <div>\n          <div style=\"font-size: 14px; font-weight: 700;\">Evolução mensal<\u002Fdiv>\n          <div style=\"font-size: 11.5px; color: #6b7280; margin-top: 2px;\">clique em um mês para abri-lo · cartões + fixas<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 9px;\">\n          <span style=\"font-size: 12px; color: #8b909a; font-weight: 600; min-width: 102px; text-align: right;\">{{ trendRangeLabel }}<\u002Fspan>\n          <div style=\"display: flex; align-items: center; gap: 3px; background: #161a21; border: 1px solid #242a34; border-radius: 9px; padding: 3px;\">\n            <button onclick=\"{{ show6 }}\" style=\"height: 26px; padding: 0 12px; border: none; background: {{ btn6Bg }}; color: {{ btn6Color }}; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 700;\">6m<\u002Fbutton>\n            <button onclick=\"{{ show12 }}\" style=\"height: 26px; padding: 0 12px; border: none; background: {{ btn12Bg }}; color: {{ btn12Color }}; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 700;\">12m<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 2px; background: #161a21; border: 1px solid #242a34; border-radius: 9px; padding: 3px;\">\n            <button onclick=\"{{ chartPrev }}\" title=\"Meses anteriores\" style=\"width: 26px; height: 26px; border: none; background: transparent; color: #c4c8d0; border-radius: 7px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center;\" style-hover=\"background:#222834;color:#fff;\">‹<\u002Fbutton>\n            <button onclick=\"{{ chartNext }}\" title=\"Próximos meses\" style=\"width: 26px; height: 26px; border: none; background: transparent; color: #c4c8d0; border-radius: 7px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center;\" style-hover=\"background:#222834;color:#fff;\">›<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      {{ lineChartSvg }}\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;#4ade80&quot;,&quot;#38bdf8&quot;,&quot;#a78bfa&quot;,&quot;#fbbf24&quot;],&quot;default&quot;:&quot;#38bdf8&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showCents&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  descRef = React.createRef();\n  amountRef = React.createRef();\n  cardRef = React.createRef();\n  catRef = React.createRef();\n  dateRef = React.createRef();\n  parcelaAtualRef = React.createRef();\n  parcelaTotalRef = React.createRef();\n  recorrenteRef = React.createRef();\n  billNameRef = React.createRef();\n  billAmountRef = React.createRef();\n  billDayRef = React.createRef();\n  billCatRef = React.createRef();\n  billParcAtualRef = React.createRef();\n  billParcTotalRef = React.createRef();\n  fileRef = React.createRef();\n\n  CATS = [\n    { name: 'Comida / Mercado', color: '#34d399' },\n    { name: 'Restaurante / Delivery', color: '#fbbf24' },\n    { name: 'Lazer', color: '#a78bfa' },\n    { name: 'Compras / Vestuário', color: '#f472b6' },\n    { name: 'Assinaturas', color: '#38bdf8' },\n    { name: 'Casa / Contas', color: '#2dd4bf' },\n    { name: 'Saúde', color: '#fb7185' },\n    { name: 'Bebê', color: '#818cf8' },\n  ];\n  CARDS = [\n    { name: 'Bradesco', color: '#e8455f' },\n    { name: 'Santander', color: '#ec5a3a' },\n    { name: 'Nubank', color: '#a855f7' },\n    { name: 'MercadoPago M', color: '#22a8e6' },\n    { name: 'MercadoPago J', color: '#6366f1' },\n  ];\n  MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];\n  MONTHS_SHORT = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];\n  KEY = 'controle-gastos-v1';\n  RATES_KEY = 'controle-gastos-rates';\n  SNAP_KEY = 'controle-gastos-snapshots';\n  LASTEXPORT_KEY = 'controle-gastos-lastexport';\n\n  state = {\n    viewYear: 2026,\n    viewMonth: 6,\n    includeFixed: true,\n    chartEnd: 2026 * 12 + 5,\n    chartCount: 6,\n    editingId: null,\n    search: '',\n    filterCat: 'Todas',\n    recorrente: false,\n    filterCard: 'Todos',\n    liveRates: null,\n    ratesAt: null,\n    lastExport: null,\n    data: this.seed(),\n  };\n\n  seed() {\n    return { transactions: [], fixedBills: [], paid: {} };\n  }\n\n  _togglePaidKey(pk) {\n    this.setState(s => {\n      const paid = { ...(s.data.paid || {}) };\n      if (paid[pk]) delete paid[pk]; else paid[pk] = true;\n      return { data: { ...s.data, paid } };\n    }, this.save);\n  }\n  togglePaid(billId) {\n    const key = this.monthKey(this.state.viewYear, this.state.viewMonth);\n    const pk = billId + '|' + key;\n    const bill = this.state.data.fixedBills.find(b => b.id === billId);\n    const usdBrl = this.usdBrlRate();\n    const btcBrl = this.btcBrlRate();\n    this.setState(s => {\n      const paid = { ...(s.data.paid || {}) };\n      const paidSnap = { ...(s.data.paidSnap || {}) };\n      if (paid[pk]) { delete paid[pk]; delete paidSnap[pk]; }\n      else {\n        paid[pk] = true;\n        if (bill) paidSnap[pk] = { brl: bill.amount, usd: bill.amount / usdBrl, btc: bill.amount / btcBrl, usdBrl, btc
